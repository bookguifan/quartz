name: Deploy Quartz v5 to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Node.js（Quartz依赖node运行构建）
        uses: actions/setup-node@v4
        with:
          node-version: 22   # ✅ 改为22

      - name: 更新npm（确保版本满足要求）
        run: npm install -g npm@latest

      - name: 安装依赖
        run: npm i

      - name: 执行Quartz构建，生成public静态站点
        run: npx quartz build

      - name: 上传构建产物public目录，供Pages部署
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
