name: Deploy Quartz v5 to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史，无需 unshallow

      - name: 安装Node.js（Quartz依赖node运行构建）
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 更新npm到最新版本（支持 --allow-git）
        run: npm install -g npm@latest

      - name: 配置 Git 使用 HTTPS 代替 SSH
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: 安装依赖（允许 Git 类型包）
        run: npm install --allow-git

      - name: 安装 Quartz 插件并构建静态站点
        run: npx quartz plugin install && npx quartz build   # ✅ 借鉴 Cloudflare 命令

      - name: 上传构建产物public目录，供Pages部署
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
