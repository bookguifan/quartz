name: Deploy Quartz v5 to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5      # 升级到 v5 避免 Node.js 20 警告
        with:
          fetch-depth: 0

      - name: 安装Node.js（Quartz依赖node运行构建）
        uses: actions/setup-node@v5    # 升级到 v5
        with:
          node-version: 22

      - name: 更新 npm 并确认版本
        run: |
          npm install -g npm@latest
          npm --version

      - name: 配置 Git 使用 HTTPS 代替 SSH
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: 创建 .npmrc 允许 Git 依赖
        run: echo "allow-git=true" > .npmrc

      - name: 安装依赖
        run: npm install

      - name: 安装 Quartz 插件并构建静态站点
        run: npx quartz plugin install && npx quartz build

      - name: 上传构建产物public目录，供Pages部署
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
